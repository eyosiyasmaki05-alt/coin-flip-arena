<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Arena - P2P Multiplayer</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0f17; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .wrapper { background: #141b26; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.7); width: 100%; max-width: 480px; padding: 25px; text-align: center; border: 1px solid #233044; }
        h1 { color: #ffca28; margin: 0 0 10px; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .pool { background: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #334155; }
        .pool-txt { font-size: 28px; color: #38bdf8; font-weight: bold; font-family: monospace; }
        .scoreboard { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 25px; }
        .card { background: #1e2633; padding: 15px; border-radius: 12px; flex: 1; border: 2px solid transparent; }
        .card.me { border-color: #ffca28; }
        .score { font-size: 32px; font-weight: bold; margin-top: 5px; }
        
        /* 3D Coin Animation */
        .coin-box { height: 150px; display: flex; justify-content: center; align-items: center; perspective: 1000px; margin-bottom: 25px; }
        .coin { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; }
        .face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; border: 5px solid #d9a700; box-shadow: inset 0 0 20px rgba(0,0,0,0.6), 0 5px 15px rgba(0,0,0,0.5); }
        .heads { background: linear-gradient(135deg, #ffe066, #f59e0b); color: #451a03; }
        .tails { background: linear-gradient(135deg, #f1f5f9, #94a3b8); color: #0f172a; transform: rotateX(180deg); border-color: #64748b; }
        
        @keyframes spinHeads { from { transform: rotateX(0); } to { transform: rotateX(2160deg); } }
        @keyframes spinTails { from { transform: rotateX(0); } to { transform: rotateX(2340deg); } }

        .btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; color: white; }
        .b-heads { background: #2563eb; } .b-tails { background: #ea580c; }
        button:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
        
        .setup-box { background: #1e2633; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        input { width: 80%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; text-align: center; margin-bottom: 10px; font-size: 14px; }
        .item-deck { background: #1e2633; padding: 12px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; border: 1px dashed #4b5563; }
        .item-deck.used { opacity: 0.3; cursor: not-allowed; }
        .logs { background: #090d14; border-radius: 8px; padding: 10px; text-align: left; font-family: monospace; font-size: 12px; height: 80px; overflow-y: auto; color: #94a3b8; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Coin Flip Arena</h1>
    
    <div class="setup-box" id="lobby-ui">
        <div style="font-size: 13px; color:#94a3b8; margin-bottom:5px;">Your Invite Game ID:</div>
        <b style="color: #ffca28; font-size: 16px;" id="my-id-display">Generating...</b>
        <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;">
        <input type="text" id="join-id-input" placeholder="Paste Opponent's ID here">
        <button style="background: #10b981; padding: 10px; font-size:14px;" onclick="connectToOpponent()">Join Opponent Arena</button>
    </div>

    <div class="pool">
        <div style="font-size: 11px; color: #94a3b8;">GLOBAL TARGET RESERVE</div>
        <div class="pool-txt"><span id="pool-disp">1,000,000</span> COINS</div>
    </div>

    <div class="scoreboard">
        <div class="card me">
            <div>You</div>
            <div class="score" id="score-me">0</div>
            <div style="font-size: 11px; color:#a1a1aa;" id="status-me">Waiting...</div>
        </div>
        <div class="card">
            <div>Opponent</div>
            <div class="score" id="score-opp">0</div>
            <div style="font-size: 11px; color:#a1a1aa;" id="status-opp">Waiting...</div>
        </div>
    </div>

    <div class="coin-box">
        <div class="coin" id="coin-obj">
            <div class="face heads">HEADS</div>
            <div class="face tails">TAILS</div>
        </div>
    </div>

    <div class="item-deck" id="steal-btn" onclick="useStealItem()">
        🃏 <b>Steal Card Powerup</b> (Take 1 Coin)
    </div>

    <div class="btn-group">
        <button class="b-heads" id="btn-h" onclick="makeChoice('Heads')" disabled>HEADS</button>
        <button class="b-tails" id="btn-t" onclick="makeChoice('Tails')" disabled>TAILS</button>
    </div>

    <div class="logs" id="log-box">> System online. Copy your ID to invite a friend!</div>
</div>

<script>
    let peer = new Peer();
    let conn = null;
    let globalPool = 1000000;
    let myScore = 0;
    let oppScore = 0;
    let myChoice = null;
    let oppChoice = null;
    let amIHost = false;
    let streak = 0;

    const logBox = document.getElementById('log-box');
    const coinObj = document.getElementById('coin-obj');

    function log(m) { logBox.innerHTML = `> ${m}<br>${logBox.innerHTML}`; }

    // 1. Generate Your Lobby Link
    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = id;
    });

    // 2. Wait for a real player to connect to you
    peer.on('connection', (connection) => {
        conn = connection;
        amIHost = true;
        setupNetworkTraffic();
        log("⚔️ Another player connected! Match started.");
        document.getElementById('lobby-ui').style.display = 'none';
        enableButtons();
    });

    // 3. Connect to a friend's ID manually
    function connectToOpponent() {
        const targetId = document.getElementById('join-id-input').value.trim();
        if(!targetId) return;
        conn = peer.connect(targetId);
        amIHost = false;
        setupNetworkTraffic();
        log("⚔️ Connected to the Host! Match started.");
        document.getElementById('lobby-ui').style.display = 'none';
        enableButtons();
    }

    function setupNetworkTraffic() {
        conn.on('data', (data) => {
            if(data.type === 'CHOICE') {
                oppChoice = data.choice;
                document.getElementById('status-opp').innerText = "Locked In 🔒";
                checkRoundResolution();
            }
            if(data.type === 'STEAL') {
                myScore = Math.max(0, myScore - 1);
                oppScore++;
                updateScores();
                log("🃏 Your opponent activated a Steal Card and robbed 1 coin from you!");
            }
            if(data.type === 'SYNC_FLIP') {
                executeVisualFlip(data.outcome, data.pool, data.hScore, data.tScore);
            }
        });
    }

    function makeChoice(val) {
        myChoice = val;
        document.getElementById('status-me').innerText = `Selected: ${val} 🔒`;
        disableButtons();
        conn.send({ type: 'CHOICE', choice: val });
        checkRoundResolution();
    }

    function checkRoundResolution() {
        if(myChoice && oppChoice && amIHost) {
            // Host acts as the central decentralized game rule authority
            const outcome = Math.random() < 0.5 ? 'Heads' : 'Tails';
            
            let p1Win = (myChoice === outcome);
            let p2Win = (oppChoice === outcome);

            if(p1Win) {
                myScore++;
                streak++;
                if(streak === 3) { myScore += 10; log("🔥 STREAK BONUS! +10 coins dropped!"); }
            } else { streak = 0; }

            if(p2Win) oppScore++;

            globalPool -= (p1Win ? 1 : 0) + (p2Win ? 1 : 0);

            // Host syncs structural game packet data directly to client browser
            executeVisualFlip(outcome, globalPool, myScore, oppScore);
            conn.send({ type: 'SYNC_FLIP', outcome, pool: globalPool, hScore: oppScore, tScore: myScore });
        }
    }

    function executeVisualFlip(outcome, pool, p1S, p2S) {
        coinObj.style.animation = 'none';
        coinObj.offsetHeight; // trigger reflow
        const anim = outcome === 'Heads' ? 'spinHeads 2s forwards' : 'spinTails 2s forwards';
        coinObj.style.animation = anim;

        setTimeout(() => {
            globalPool = pool;
            myScore = p1S;
            oppScore = p2S;
            updateScores();

            log(`Flip Result: <b>${outcome}</b>`);
            myChoice = null;
            oppChoice = null;
            document.getElementById('status-me').innerText = "Waiting...";
            document.getElementById('status-opp').innerText = "Waiting...";
            enableButtons();
        }, 2000);
    }

    function useStealItem() {
        if(oppScore > 0) {
            document.getElementById('steal-btn').classList.add('used');
            oppScore--;
            myScore++;
            updateScores();
            conn.send({ type: 'STEAL' });
            log("🃏 Steal card successfully triggered! You stole 1 coin from your opponent.");
        }
    }

    function updateScores() {
        document.getElementById('score-me').innerText = myScore;
        document.getElementById('score-opp').innerText = oppScore;
        document.getElementById('pool-disp').innerText = globalPool.toLocaleString();
    }

    function enableButtons() {
        document.getElementById('btn-h').disabled = false;
        document.getElementById('btn-t').disabled = false;
    }
    function disableButtons() {
        document.getElementById('btn-h').disabled = true;
        document.getElementById('btn-t').disabled = true;
    }
</script>

</body>
</html>
