<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Arena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121824;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .arena-card {
            background: #1c2333;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        h1 { margin-top: 0; color: #4fd1c5; font-size: 28px; }
        .pool-box {
            background: #2d3748;
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-heads { background: #3182ce; color: white; }
        .btn-tails { background: #e53e3e; color: white; }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        .log-box {
            background: #0f141c;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #2d3748;
            color: #a0aec0;
        }
    </style>
</head>
<body>

<div class="arena-card">
    <h1>Coin Flip Arena</h1>
    <div class="pool-box">Your Balance: $<span id="balance-display">10000</span></div>
    
    <label>Bet Amount ($)</label>
    <input type="number" id="bet-input" value="10" min="1">

    <div class="btn-group">
        <button class="btn-heads" onclick="placeBet('Heads')">Heads</button>
        <button class="btn-tails" onclick="placeBet('Tails')">Tails</button>
    </div>

    <div class="log-box" id="log-output">System initialized. Ready to flip!</div>
</div>

<script>
    let playerBalance = 10000;
    const logBox = document.getElementById('log-output');
    const balanceDisplay = document.getElementById('balance-display');

    function log(message) {
        logBox.innerHTML = message + "<br>" + logBox.innerHTML;
    }

    function placeBet(playerChoice) {
        const betInput = document.getElementById('bet-input');
        const bet = Number(betInput.value);

        if (bet > playerBalance) {
            log(`[ERROR] Insufficient balance!`);
            return;
        }
        if (bet <= 0) {
            log(`[ERROR] Invalid bet amount!`);
            return;
        }

        log(`Flipping for ${playerChoice} with $${bet}...`);

        // Perform the flip right here in the browser
        setTimeout(() => {
            const outcome = Math.random() < 0.5 ? 'Heads' : 'Tails';
            const playerWon = (outcome === playerChoice);

            if (playerWon) {
                playerBalance += bet;
                log(`[RESULT] Coin landed on: <b>${outcome}</b>. You WON $${bet}! 🎉`);
            } else {
                playerBalance -= bet;
                log(`[RESULT] Coin landed on: <b>${outcome}</b>. You LOST $${bet}. 😢`);
            }

            balanceDisplay.innerText = playerBalance;
            log(`-----------------------------------`);
        }, 600); // Gives a brief pause to simulate the flip
    }
</script>

</body>
</html>
