<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Arena</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121824;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .arena-card {
            background: #1c2333;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #2d3748;
        }
        h1 { margin-top: 0; color: #4fd1c5; font-size: 28px; }
        .pool-box {
            background: #2d3748;
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:active { transform: scale(0.98); }
        .btn-heads { background: #3182ce; color: white; }
        .btn-tails { background: #e53e3e; color: white; }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
        }
        .log-box {
            background: #0f141c;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            font-family: monospace;
            font-size: 12px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #2d3748;
            color: #a0aec0;
        }
    </style>
</head>
<body>

<div class="arena-card">
    <h1>Coin Flip Arena</h1>
    <div class="pool-box">Global Pool: $<span id="pool-display">0</span></div>
    
    <label>Bet Amount ($)</label>
    <input type="number" id="bet-input" value="10" min="1">
    
    <label>Your Client Seed (For Fairness Check)</label>
    <input type="text" id="seed-input" value="lucky_player">

    <div class="btn-group">
        <button class="btn-heads" onclick="placeBet('Heads')">Heads</button>
        <button class="btn-tails" onclick="placeBet('Tails')">Tails</button>
    </div>

    <div class="log-box" id="log-output">System initialized. Waiting for action...</div>
</div>

<script>
    // Dynamically look at the address bar to connect to WebSockets securely
    const socketProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
    const socketUrl = socketProtocol + window.location.host;
    const socket = new WebSocket(socketUrl);

    const logBox = document.getElementById('log-output');
    const poolDisplay = document.getElementById('pool-display');

    function log(message) {
        logBox.innerHTML = message + "<br>" + logBox.innerHTML;
    }

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        if (data.type === 'INIT') {
            poolDisplay.innerText = data.poolBalance;
        }

        if (data.type === 'RESULT') {
            poolDisplay.innerText = data.poolBalance;
            log(`[RESULT] Coin landed on: <b>${data.outcome}</b>`);
            log(`[HASH] ${data.hash.substring(0, 24)}...`);
            log(`-----------------------------------`);
        }
    };

    function placeBet(playerChoice) {
        const bet = document.getElementById('bet-input').value;
        const seed = document.getElementById('seed-input').value;

        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({
                type: 'FLIP',
                choice: playerChoice,
                betAmount: bet,
                clientSeed: seed
            }));
            log(`Flipping for ${playerChoice} with $${bet}...`);
        } else {
            log(`Error: Connection closed. Please refresh.`);
        }
    }
</script>

</body>
</html>
